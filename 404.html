<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Akash Hossain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    #page-404 {
      min-height: calc(100vh - 200px);
      display: flex;
      align-items: center;
      padding: 120px 0 80px;
    }
    .e404-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
    }
    .e404-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .e404-label::before {
      content: '';
      width: 32px;
      height: 1px;
      background: var(--text-muted);
      flex-shrink: 0;
    }
    .e404-number {
      font-size: clamp(120px, 18vw, 200px);
      font-weight: 600;
      letter-spacing: -0.05em;
      line-height: 1;
      color: var(--text);
      margin-bottom: 24px;
    }
    .e404-sub {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 320px;
    }
    .e404-tagline {
      font-size: clamp(20px, 2.4vw, 26px);
      font-weight: 500;
      letter-spacing: -0.02em;
      line-height: 1.35;
      color: var(--text);
      margin-bottom: 40px;
    }
    .e404-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .e404-btn {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 18px 24px;
      background: #131313;
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      font-size: 15px;
      font-weight: 400;
      transition: border-color 0.2s, background 0.2s;
    }
    .e404-btn:hover { border-color: #444; background: #1a1a1a; }
    .e404-btn-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .e404-btn-icon svg { width: 20px; height: 20px; }
    .e404-btn-text { flex: 1; }
    .e404-btn-arrow { color: var(--text-muted); }

    @media (max-width: 768px) {
      .e404-grid { grid-template-columns: 1fr; gap: 48px; }
      #page-404 { padding: 100px 0 60px; }
    }
  </style>
</head>
<body>

  <nav></nav>

  <section id="page-404">
    <div class="container">
      <div class="e404-grid">

        <div>
          <div class="e404-label">Portfolio</div>
          <div class="e404-number">404</div>
          <p class="e404-sub">The site may be under maintenance.<br/>Stay tuned — it'll be worth the wait.</p>
        </div>

        <div>

          <div class="e404-actions">

            <a href="#" class="e404-btn">

              </div>
              <span class="e404-btn-text">See a prototype</span>
              <svg class="e404-btn-arrow" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3.75 9h10.5M9.75 4.5L14.25 9l-4.5 4.5"/></svg>
            </a>

              </div>
              <span class="e404-btn-text">Explore my works</span>
              <svg class="e404-btn-arrow" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3.75 9h10.5M9.75 4.5L14.25 9l-4.5 4.5"/></svg>

                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="20" height="20"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" fill="currentColor" stroke="none"/></svg>
              </div>
              <span class="e404-btn-text">Say Hello</span>
              <svg class="e404-btn-arrow" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3.75 9h10.5M9.75 4.5L14.25 9l-4.5 4.5"/></svg>
            </a>

          </div>
        </div>

      </div>
    </div>
  </section>

  <footer></footer>

  <script src="components.js"></script>
</body>
</html>
