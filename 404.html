<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Akash Hossain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    #page-404 {
      min-height: calc(100vh - 200px);
      display: flex;
      align-items: center;
      padding: 120px 0 80px;
    }
    .e404-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
    }
    .e404-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .e404-label::before {
      content: '';
      width: 32px;
      height: 1px;
      background: var(--text-muted);
      flex-shrink: 0;
    }
    .e404-number {
      font-size: clamp(120px, 18vw, 200px);
      font-weight: 200;
      letter-spacing: -0.05em;
      line-height: 1;
      color: var(--text);
      margin-bottom: 24px;
    }
    .e404-sub {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 320px;
    }
    .e404-tagline {
      font-size: clamp(20px, 2.4vw, 26px);
      font-weight: 500;
      letter-spacing: -0.02em;
      line-height: 1.35;
      color: var(--text);
      margin-bottom: 40px;
    }
    .e404-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .e404-btn {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 18px 24px;
      background: #131313;
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      font-size: 15px;
      font-weight: 400;
      transition: border-color 0.2s, background 0.2s;
    }
    .e404-btn:hover { border-color: #444; background: #1a1a1a; }
    .e404-btn-icon {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .e404-btn-icon img { width: 44px; height: 44px; opacity: 1; }
    .e404-btn-text { flex: 1; }
    .e404-btn-arrow { color: var(--text-muted); }

    @media (max-width: 768px) {
      .e404-grid { grid-template-columns: 1fr; gap: 48px; }
      #page-404 { padding: 100px 0 60px; }
    }
  </style>
</head>
<body>

  <nav></nav>

  <section id="page-404">
    <div class="container">
      <div class="e404-grid">

        <div>
          <div class="e404-label">Portfolio</div>
          <div class="e404-number">404</div>
          <p class="e404-sub">The site may be under maintenance.<br/>Stay tuned — it'll be worth the wait.</p>
        </div>

        <div>
          <div class="e404-label">In the meantime</div>
          <p class="e404-tagline">Explore my work or drop me a like<br/>while the new site takes shape.</p>
          <div class="e404-actions">

            <a href="https://www.figma.com/proto/gnGmJ2ypNRRgeBJ5w2rU6a/Prototype?node-id=1-1278&viewport=211%2C207%2C0.1&t=t6AodR8lesfYKSdN-1&scaling=scale-down&content-scaling=fixed&page-id=1%3A2" target="_blank" class="e404-btn">
              <div class="e404-btn-icon">
                <img src="images/Vector.svg" alt="Prototype" width="44" height="44" />
              </div>
              <span class="e404-btn-text">See a prototype</span>
              <svg class="e404-btn-arrow" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3.75 9h10.5M9.75 4.5L14.25 9l-4.5 4.5"/></svg>
            </a>

            <a href="https://www.behance.net/akashhossain" target="_blank" class="e404-btn">
              <div class="e404-btn-icon">
                <img src="images/Behance.svg" alt="Behance" width="44" height="44" />
              </div>
              <span class="e404-btn-text">Explore my works</span>
              <svg class="e404-btn-arrow" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3.75 9h10.5M9.75 4.5L14.25 9l-4.5 4.5"/></svg>
            </a>

            <a href="https://www.linkedin.com/in/akash-h-11946b16b" target="_blank" class="e404-btn">
              <div class="e404-btn-icon">
                <img src="images/LinkedIN_white.svg" alt="LinkedIn" width="44" height="44" />
              </div>
              <span class="e404-btn-text">Say Hello</span>
              <svg class="e404-btn-arrow" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3.75 9h10.5M9.75 4.5L14.25 9l-4.5 4.5"/></svg>
            </a>

          </div>
        </div>

      </div>
    </div>
  </section>

  <footer></footer>

  <script src="components.js"></script>
</body>
</html>
